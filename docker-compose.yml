version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./models/trained:/app/models/trained
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  dashboard:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./models/trained:/app/models/trained
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    restart: unless-stopped

  scheduler:
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./models/trained:/app/models/trained
    command: python main.py scheduler
    restart: unless-stopped
