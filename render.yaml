# Render.com deployment config
services:
  - type: web
    name: ipl-prediction-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: WEATHER_API_KEY
        sync: false
